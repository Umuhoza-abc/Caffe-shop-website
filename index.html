<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>U&J Caffe Shop</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="./images/shop-caffe.avif" alt="Caffe Shop Logo">
            </div>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
                <li><a href="#menu">Menu</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            <button id="theme-toggle">🌙</button>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
                <h1>Wake Up to Better Coffee</h1>
                <p>Crafted with passion, served with a smile.</p>
                <button class="cta-btn">Order Now</button>
            </div>
            <img src="./images/hero-coffee.avif" alt="Freshly brewed coffee" class="hero-img">
        </section>

        <section id="services" class="features">
            <h2>Our Services</h2>
            <div class="feature-container" id="services-list">
                </div>
        </section>

        <section id="contact">
            <form id="contact-form">
                <input type="text" id="name" placeholder="Your Name" required>
                <input type="email" id="email" placeholder="Your Email" required>
                <textarea id="message" placeholder="Your Message"></textarea>
                <button type="submit">Send Message</button>
            </form>
            <p id="form-feedback"></p>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
